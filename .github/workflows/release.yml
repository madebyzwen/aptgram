name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag (for example v1.1.0)"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Refuse an existing GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release already exists: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Run release checks and build assets
        run: tools/check-release.sh --tag "${RELEASE_TAG}"

      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${RELEASE_TAG#v}"

          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\] - " {
              capture = 1
              next
            }
            capture && /^## \[/ {
              exit
            }
            capture {
              print
            }
          ' CHANGELOG.md >"${RUNNER_TEMP}/release-notes.md"

          if [[ ! -s "${RUNNER_TEMP}/release-notes.md" ]]; then
            echo "No release notes found for ${version}." >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${RELEASE_TAG#v}"

          gh release create "${RELEASE_TAG}" \
            "dist/aptgram-v${version}.tar.gz" \
            "dist/aptgram-v${version}.tar.gz.sha256" \
            "dist/aptgram.tar.gz" \
            "dist/aptgram.tar.gz.sha256" \
            "dist/aptgram.version" \
            --title "APTGRAM ${RELEASE_TAG}" \
            --notes-file "${RUNNER_TEMP}/release-notes.md" \
            --verify-tag
